name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }} ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: unblind-desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macOS
            arch: arm64
          - os: macos-13
            platform: macOS
            arch: amd64
          - os: windows-latest
            platform: Windows
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: unblind-desktop/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build application
        run: wails build -clean

      - name: Remove quarantine attribute (macOS)
        if: runner.os == 'macOS'
        run: xattr -cr build/bin/unblind-desktop.app

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r "$GITHUB_WORKSPACE/unblind-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.ref_name }}.zip" unblind-desktop.app

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "build\bin\unblind-desktop.exe" `
            -DestinationPath "$env:GITHUB_WORKSPACE\unblind-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.ref_name }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: unblind-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.ref_name }}
          path: unblind-desktop-${{ matrix.platform }}-${{ matrix.arch }}-${{ github.ref_name }}.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*.zip
